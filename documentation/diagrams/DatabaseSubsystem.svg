comes accepted only after both</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135.8589" x="1237" y="731.0737">users agree to connect.</text></g><g class="entity" data-qualified-name="GMN24" data-source-line="109" id="ent0025"><path d="M6,382.6514 L6,440.4302 L327.6377,440.4302 L327.6377,392.6514 L317.6377,382.6514 L6,382.6514" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M317.6377,382.6514 L317.6377,392.6514 L327.6377,392.6514 L317.6377,382.6514" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.4478" x="12" y="400.7212">Venue is retained as an internal technical entity</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293.376" x="12" y="416.6475">because the current event-import and location-filter</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300.6377" x="12" y="432.5737">code depends on it. It is not a separate user feature.</text></g><g class="entity" data-qualified-name="N1" data-source-line="114" id="ent0027"><path d="M579,117.1514 L579,143.0776 L1176.7036,143.0776 L1176.7036,127.1514 L1166.7036,117.1514 L579,117.1514" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1166.7036,117.1514 L1166.7036,127.1514 L1176.7036,127.1514 L1166.7036,117.1514" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="576.7036" x="585" y="135.2212">The unused notifications table is excluded to keep the design aligned with the approved MVP scope.</text></g><!--reverse link User to UserPreference--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="composition" data-source-line="86" id="lnk9"><path codeLine="86" d="M368.5,560.1714 C368.5,600.0514 368.5,621.